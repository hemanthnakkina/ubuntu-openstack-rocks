name: heat-engine
summary: Openstack heat-engine
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack heat-engine
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  heat-engine:
    override: replace
    command: /usr/bin/heat-engine
    user: heat
    group: heat

parts:
  heat-user:
    plugin: nil
    # 42418:42418 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42418 --system heat
      useradd \
        --gid 42418 \
        --uid 42418 \
        --no-create-home \
        --home /var/lib/heat \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        heat

  heat-engine:
    after: [heat-user]
    plugin: nil
    overlay-packages:
      - sudo
      - heat-engine
