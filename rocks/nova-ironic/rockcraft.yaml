name: nova-ironic
summary: Openstack nova-ironic
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack nova-ironic
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  nova-ironic:
    override: replace
    command: nova-ironic
    user: nova
    group: nova

parts:
  nova-compute-user:
    plugin: nil
    # 42436:42436 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42436 --system nova
      useradd \
        --gid 42436 \
        --uid 42436 \
        --no-create-home \
        --home /var/lib/nova \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        nova

  nova-ironic:
    after: [nova-compute-user]
    plugin: nil
    overlay-packages:
      - sudo
      - nova-compute
      - python3-ironicclient
      # For nova-novncproxy
      - novnc
