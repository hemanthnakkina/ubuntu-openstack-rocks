name: cinder-consolidated
summary: Openstack consolidated
license: Apache-2.0
description: |
  Ubuntu distribution of Cinder which can be used for all Cinder services
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:
  s390x:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

parts:
  cinder-user:
    plugin: nil
    # 42407:42407 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42407 --system cinder
      useradd \
        --gid 42407 \
        --uid 42407 \
        --no-create-home \
        --home /var/lib/cinder \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        cinder

  cinder-consolidated:
    after: [cinder-user]
    plugin: nil
    overlay-packages:
      - sudo
      - cinder-api
      - cinder-scheduler
      - cinder-volume
      - ceph-common
      - nfs-common
      - sysfsutils
      - tgt
    override-prime: |
      craftctl default
      echo > $CRAFT_PRIME/etc/apache2/ports.conf
