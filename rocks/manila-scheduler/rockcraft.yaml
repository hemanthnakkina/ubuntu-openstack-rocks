name: manila-scheduler
summary: Openstack manila-scheduler
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack manila-scheduler
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  manila-scheduler:
    override: replace
    command: manila-scheduler
    user: manila
    group: manila

parts:
  manila-user:
    plugin: nil
    # 42470:42470 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42470 --system manila
      useradd \
        --gid 42470 \
        --uid 42470 \
        --no-create-home \
        --home /var/lib/manila \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        manila

  manila-scheduler:
    after: [manila-user]
    plugin: nil
    overlay-packages:
      - sudo
      - manila-scheduler
