name: masakari-monitors
summary: Openstack masakari-monitors
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack masakari monitors
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  masakari-hostmonitor:
    override: replace
    command: masakari-hostmonitor
    user: masakari
    group: masakari

parts:
  masakari-user:
    plugin: nil
    # 42424:42424 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42424 --system masakari
      useradd \
        --gid 42424 \
        --uid 42424 \
        --no-create-home \
        --home /var/lib/masakari \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        masakari

  masakari-monitors:
    after: [masakari-user]
    plugin: nil
    overlay-packages:
      - sudo
      - python3-masakari-monitors
      - python3-consul
