name: ironic-conductor
summary: Openstack ironic-conductor
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack ironic-conductor
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  ironic-conductor:
    override: replace
    command: ironic-conductor
    user: ironic
    group: ironic

parts:
  ironic-conductor-user:
    plugin: nil
    # 42422:42422 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42422 --system ironic
      useradd \
        --gid 42422 \
        --uid 42422 \
        --no-create-home \
        --home /var/lib/ironic \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        ironic

  ironic-conductor:
    after: [ironic-conductor-user]
    plugin: nil
    overlay-packages:
      - sudo
      - apache2
      - ironic-conductor
      - tftpd-hpa
