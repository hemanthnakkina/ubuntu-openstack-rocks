name: ovn-nb-db-server
summary: Openstack ovn-nb-db-server
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack ovn-nb-db-server
version: "26.03"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:
  s390x:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

parts:
  ovn-nb-db-server:
    plugin: nil
    overlay-packages:
      - sudo
      - ovn-central
      - openvswitch-switch
      - python3-openvswitch
      - python3-netifaces
