name: neutron-api
summary: Openstack neutron-api
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack neutron-api
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  wsgi-neutron-api:
    override: replace
    command: apachectl -D FOREGROUND

parts:
  neutron-user:
    plugin: nil
    # 42435:42435 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42435 --system neutron
      useradd \
        --gid 42435 \
        --uid 42435 \
        --no-create-home \
        --home /var/lib/neutron \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        neutron

  neutron-api:
    after: [neutron-user]
    plugin: nil
    overlay-packages:
      - sudo
      - neutron-api
      - python3-ironic-neutron-agent
      - python3-neutron-dynamic-routing
      - python3-neutron-vpnaas
      - python3-networking-generic-switch
      - python3-networking-sfc
      - python3-oslo.vmware
      - apache2
      - libapache2-mod-wsgi-py3
      - openvswitch-common
    override-prime: |
      craftctl default
      echo > $CRAFT_PRIME/etc/apache2/ports.conf
