name: neutron-periodic-workers
summary: Openstack neutron-periodic-workers
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack neutron-periodic-workers
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  neutron-periodic-workers:
    override: replace
    command: neutron-periodic-workers
    user: neutron
    group: neutron

parts:
  neutron-user:
    plugin: nil
    # 42435:42435 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42435 --system neutron
      useradd \
        --gid 42435 \
        --uid 42435 \
        --no-create-home \
        --home /var/lib/neutron \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        neutron

  neutron-periodic-workers:
    after: [neutron-user]
    plugin: nil
    overlay-packages:
      - sudo
      - neutron-periodic-workers
