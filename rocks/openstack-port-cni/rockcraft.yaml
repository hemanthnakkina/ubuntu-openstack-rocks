name: openstack-port-cni
summary: OpenStack port CNI plugin
license: Apache-2.0
description: |
  A CNI plugin that wraps ovs-cni with OpenStack Neutron port management.
  Uses a thin/thick architecture where a lightweight CNI binary delegates
  OpenStack operations to a daemon over a Unix domain socket.
version: "0.1.0-7e56263"

base: bare
# renovate: build-base: ubuntu:26.04@sha256:fed6ddb82c61194e1814e93b59cfcb6759e5aa33c4e41bb3782313c2386ed6df
build-base: devel
platforms:
  amd64:
  arm64:

parts:
  openstack-port-cni:
    plugin: go
    source: https://github.com/canonical/openstack-port-cni
    source-commit: 7e56263f3d2fd0dd580078c9243171fc689e0520
    source-type: git
    source-depth: 1
    build-environment:
      - CGO_ENABLED: "0"
      - GOFLAGS: -mod=readonly -ldflags=-s
    build-snaps:
      - go/1.25/stable
    override-prime: |
      craftctl default
      mkdir -p $CRAFT_PRIME/opt/cni/bin
      mv $CRAFT_PRIME/usr/bin/openstack-port-cni $CRAFT_PRIME/opt/cni/bin/openstack-port-cni
