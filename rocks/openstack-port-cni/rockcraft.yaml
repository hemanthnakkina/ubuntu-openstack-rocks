name: openstack-port-cni
summary: OpenStack port CNI plugin
license: Apache-2.0
description: |
  A CNI plugin that wraps ovs-cni with OpenStack Neutron port management.
  Uses a thin/thick architecture where a lightweight CNI binary delegates
  OpenStack operations to a daemon over a Unix domain socket.
version: "0.1.0-127cdfa-24.04"

base: bare
# renovate: base: ubuntu:24.04@sha256:b359f1067efa76f37863778f7b6d0e8d911e3ee8efa807ad01fbf5dc1ef9006b
build-base: ubuntu@24.04
platforms:
  amd64:
  arm64:

parts:
  shell-tools:
    plugin: nil
    stage-packages:
      - dash_bins
      - coreutils_bins
    override-prime: |
      craftctl default
      # Chisel places binaries under usr/bin/ but bare rocks have no usrmerge
      # bin->usr/bin symlink. Unlike ovs-cni-plugin (where override-build puts
      # binaries at the root of CRAFT_PART_INSTALL), the go plugin here outputs
      # to bin/, and openstack-port-daemon remains there after organize moves
      # openstack-port-cni to opt/cni/bin/. Because bin/ exists as a real
      # directory, we cannot replace it with a symlink, so create individual
      # symlinks for /bin/sh and /bin/cp instead.
      ln -sf ../usr/bin/dash $CRAFT_PRIME/bin/sh
      ln -sf ../usr/bin/cp $CRAFT_PRIME/bin/cp

  openstack-port-cni:
    plugin: go
    source: https://github.com/canonical/openstack-port-cni
    source-commit: 127cdfade20862cce9ef7f8b9568c08cbabe8356
    source-type: git
    source-depth: 1
    build-environment:
      - CGO_ENABLED: "0"
      - GOFLAGS: -mod=readonly -ldflags=-s
    build-snaps:
      - go/1.25/stable
    organize:
      bin/openstack-port-cni: opt/cni/bin/openstack-port-cni
