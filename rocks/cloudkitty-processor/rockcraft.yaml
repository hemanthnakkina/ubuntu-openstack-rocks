name: cloudkitty-processor
summary: Openstack cloudkitty-processor
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack cloudkitty-processor
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  cloudkitty-processor:
    override: replace
    command: cloudkitty-processor
    user: cloudkitty
    group: cloudkitty

parts:
  cloudkitty-user:
    plugin: nil
    # 42408:42408 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42408 --system cloudkitty
      useradd \
        --gid 42408 \
        --uid 42408 \
        --no-create-home \
        --home /var/lib/cloudkitty \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        cloudkitty

  cloudkitty-processor:
    after: [cloudkitty-user]
    plugin: nil
    overlay-packages:
      - sudo
      - cloudkitty-processor
