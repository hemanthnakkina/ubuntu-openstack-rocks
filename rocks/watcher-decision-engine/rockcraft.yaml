name: watcher-decision-engine
summary: Openstack watcher-decision-engine
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack Watcher decision engine service
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  watcher-decision-engine:
    override: replace
    command: watcher-decision-engine
    user: watcher
    group: watcher

parts:
  watcher-user:
    plugin: nil
    # 42451:42451 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42451 --system watcher
      useradd \
        --gid 42451 \
        --uid 42451 \
        --no-create-home \
        --home /var/lib/watcher \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        watcher

  watcher-decision-engine:
    after: [watcher-user]
    plugin: nil
    overlay-packages:
      - sudo
      - watcher-decision-engine
