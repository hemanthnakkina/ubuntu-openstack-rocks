name: magnum-consolidated
summary: Openstack magnum-consolidated
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack magnum-consolidated
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always
  - type: apt
    ppa: canonical-openstack/magnum-capi-helm
  - type: apt
    ppa: canonical-openstack/2026.1-fix-builds-uca-gazpacho
    priority: 1500

parts:
  magnum-user:
    plugin: nil
    # 42428:42428 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42428 --system magnum
      useradd \
        --gid 42428 \
        --uid 42428 \
        --no-create-home \
        --home /var/lib/magnum \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        magnum

  magnum-consolidated:
    after: [magnum-user]
    plugin: nil
    stage-snaps:
      - helm/latest/stable
    overlay-packages:
      - sudo
      - apache2
      - libapache2-mod-wsgi-py3
      - magnum-api
      - magnum-conductor
      - python3-magnum-capi-helm
    override-prime: |
      craftctl default
      echo > $CRAFT_PRIME/etc/apache2/ports.conf

      # Move helm package to bin
      mv $CRAFT_PRIME/helm $CRAFT_PRIME/usr/bin/
