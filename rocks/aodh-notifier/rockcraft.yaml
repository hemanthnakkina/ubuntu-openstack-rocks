name: aodh-notifier
summary: Openstack aodh-notifier
license: Apache-2.0
description: |
  Ubuntu distribution of OpenStack aodh-notifier
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    cloud: gazpacho
    priority: always

services:
  aodh-notifier:
    override: replace
    command: aodh-notifier
    user: aodh
    group: aodh

parts:
  aodh-user:
    plugin: nil
    # 42402:42402 for kolla compatibility
    overlay-script: |
      groupadd --root $CRAFT_OVERLAY --gid 42402 --system aodh
      useradd \
        --gid 42402 \
        --uid 42402 \
        --no-create-home \
        --home /var/lib/aodh \
        --root $CRAFT_OVERLAY \
        --system \
        --shell /bin/false \
        aodh

  aodh-notifier:
    after: [aodh-user]
    plugin: nil
    overlay-packages:
      - sudo
      - aodh-notifier
