name: openstack-images-sync
summary: Daemon to synchronize streams from a simplestreams server to glance
license: Apache-2.0
description: >-
  Openstack Images Sync is a tool allowing synchronization
  from a list of SimpleStreams source to an OpenStack cloud.
version: "2026.1"
# renovate: base: ubuntu:24.04@sha256:023f8a753c22258c9fe2d0005a7d28258038da7d620e9f93e9ad78aa266f9f11
base: ubuntu@24.04

platforms:
  amd64:
  arm64:
  s390x:

run-user: _daemon_

services:
  http-mirror:
    override: replace
    command: apachectl -D FOREGROUND
  images-sync:
    override: replace
    command: simplestreams-sync
    group: _daemon_
    user: _daemon_

parts:
  httpd:
    plugin: nil
    overlay-packages:
      - apache2
    overlay-script: |
      rm ${CRAFT_OVERLAY}/etc/apache2/ports.conf
    override-prime: |
      craftctl default
      mkdir -p $CRAFT_PRIME/etc/apache2/
      echo > $CRAFT_PRIME/etc/apache2/ports.conf

  openstack-images-sync:
    plugin: python
    source: https://github.com/canonical/openstack-images-sync/
    source-type: git
    source-depth: 1
    source-commit: 89f18a706b369892b418125fae7879e5550c4827
    build-packages:
      # cryptography has no prebuilt s390x wheel, so it is built from
      # source via Rust; openssl-sys needs pkg-config and the OpenSSL
      # headers to locate the system OpenSSL.
      - pkg-config
      - libssl-dev
    stage-packages:
      - python3
      - python3-venv
